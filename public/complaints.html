<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Complaints - Civic Grievance System</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="./css/complaints.css" />
  </head>

  <body>
    <div class="dashboard-header">
      <div class="header-content">
        <h1>
          <i class="fas fa-list" style="color: #667eea"></i> My Complaints
        </h1>
        <div class="user-menu">
          <span class="user-name" id="userName">Loading...</span>
          <button class="refresh-btn" onclick="fetchComplaints()">
            <i class="fas fa-sync-alt"></i> Refresh
          </button>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>
    </div>

    <div class="dashboard-content">
      <!-- Action Bar -->
      <div class="action-bar">
        <div class="action-buttons">
          <a href="/report.html" class="action-btn primary-btn">
            <i class="fas fa-plus-circle"></i> New Complaint
          </a>
          <a href="/dashboard.html" class="action-btn secondary-btn">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
          </a>
        </div>
      </div>

      <!-- Search Bar -->
      <div class="search-bar">
        <i class="fas fa-search"></i>
        <input
          type="text"
          id="searchInput"
          placeholder="Search by ID, title, or category..."
        />
      </div>

      <!-- Filter Buttons -->
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">
          All Complaints
        </button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="in-progress">
          In Progress
        </button>
        <button class="filter-btn" data-filter="resolved">Resolved</button>
        <button class="filter-btn" data-filter="emergency">Emergency</button>
      </div>

      <!-- Complaints Grid -->
      <div id="complaintsContainer">
        <div class="loading-spinner">
          <i class="fas fa-spinner fa-spin"></i>
          <p>Loading your complaints...</p>
        </div>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="pagination"></div>
    </div>

    <!-- Rating Modal -->
    <div class="rate-modal" id="rateModal">
      <div class="rate-modal-content">
        <h2
          style="
            font-size: 24px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 10px;
          "
        >
          <i class="fas fa-star" style="color: #fbbf24"></i> Rate Your
          Experience
        </h2>
        <p
          id="ratingComplaintInfo"
          style="color: #718096; margin-bottom: 20px"
        ></p>

        <div class="star-rating" id="starRating">
          <i class="fas fa-star" data-rating="1"></i>
          <i class="fas fa-star" data-rating="2"></i>
          <i class="fas fa-star" data-rating="3"></i>
          <i class="fas fa-star" data-rating="4"></i>
          <i class="fas fa-star" data-rating="5"></i>
        </div>

        <textarea
          id="ratingComment"
          class="rating-input"
          placeholder="Share your feedback (optional)"
        ></textarea>

        <div class="modal-actions">
          <button class="modal-btn cancel-btn" onclick="closeRatingModal()">
            Cancel
          </button>
          <button
            class="modal-btn submit-rate-btn"
            onclick="submitRating()"
            id="submitRatingBtn"
            disabled
          >
            Submit Rating
          </button>
        </div>
      </div>
    </div>

    <!-- Media Modal -->
    <div class="media-modal" id="mediaModal">
      <span class="close-modal" onclick="closeMediaModal()">&times;</span>
      <div class="modal-content" id="modalContent"></div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script>
      const token = localStorage.getItem("token");
      const user = JSON.parse(localStorage.getItem("user") || "{}");

      if (!token) {
        window.location.href = "/index.html";
      }

      document.getElementById("userName").textContent = user.name || "User";

      let allComplaints = [];
      let filteredComplaints = [];
      let currentFilter = "all";
      let currentPage = 1;
      let itemsPerPage = 6;
      let selectedRatingComplaint = null;
      let selectedRating = 0;

      // Toast notification function
      function showToast(message, type = "success") {
        const container = document.getElementById("toastContainer");

        const toast = document.createElement("div");
        toast.className = `toast ${type}`;

        const icon = document.createElement("i");
        icon.className = `fas ${type === "success" ? "fa-check-circle" : "fa-exclamation-circle"}`;

        const span = document.createElement("span");
        span.textContent = message;

        toast.appendChild(icon);
        toast.appendChild(span);
        container.appendChild(toast);

        setTimeout(() => {
          toast.style.animation = "slideOut 0.3s ease";
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      // Fetch complaints from server
      async function fetchComplaints() {
        showLoading();

        try {
          const response = await fetch("/api/complaints", {
            headers: {
              Authorization: `Bearer ${token}`,
            },
          });

          const data = await response.json();

          if (response.ok) {
            allComplaints = data.complaints;
            filterComplaints();
          } else {
            showToast("Error loading complaints", "error");
            loadMockData();
          }
        } catch (error) {
          console.error("Error fetching complaints:", error);
          showToast("Network error. Using demo data.", "error");
          loadMockData();
        }
      }

      // Filter complaints based on current filter
      function filterComplaints() {
        const searchTerm =
          document.getElementById("searchInput")?.value.toLowerCase() || "";

        filteredComplaints = allComplaints.filter((complaint) => {
          // Filter by status
          if (currentFilter !== "all") {
            if (currentFilter === "pending") {
              if (
                complaint.status === "Resolved" ||
                complaint.status === "Closed"
              )
                return false;
            } else if (currentFilter === "resolved") {
              if (complaint.status !== "Resolved") return false;
            } else if (currentFilter === "emergency") {
              if (!complaint.isEmergency && complaint.status !== "Emergency")
                return false;
            } else if (currentFilter === "in-progress") {
              if (complaint.status !== "In Progress") return false;
            }
          }

          // Search
          if (searchTerm) {
            return (
              complaint.title.toLowerCase().includes(searchTerm) ||
              complaint.complaintId.toLowerCase().includes(searchTerm) ||
              complaint.category.toLowerCase().includes(searchTerm) ||
              (complaint.description &&
                complaint.description.toLowerCase().includes(searchTerm))
            );
          }

          return true;
        });

        currentPage = 1;
        displayComplaints();
        setupPagination();
      }

      // Display complaints
      function displayComplaints() {
        const container = document.getElementById("complaintsContainer");

        if (!filteredComplaints || filteredComplaints.length === 0) {
          container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No Complaints Found</h3>
                        <p>You haven't submitted any complaints yet.</p>
                        <a href="/report.html" class="action-btn primary-btn" style="margin-top: 20px; display: inline-flex;">
                            <i class="fas fa-plus-circle"></i> Submit Your First Complaint
                        </a>
                    </div>
                `;
          return;
        }

        const start = (currentPage - 1) * itemsPerPage;
        const paginatedComplaints = filteredComplaints.slice(
          start,
          start + itemsPerPage,
        );

        container.innerHTML = paginatedComplaints
          .map((complaint) => {
            const isCompleted = complaint.status === "Resolved";
            const isEmergency =
              complaint.isEmergency || complaint.status === "Emergency";
            const isInProgress = complaint.status === "In Progress";

            let statusClass = "status-submitted";
            let statusText = complaint.status;

            if (isEmergency) {
              statusClass = "status-emergency";
              statusText = "🚨 EMERGENCY";
            } else if (complaint.status === "Resolved") {
              statusClass = "status-resolved";
              statusText = "✓ RESOLVED";
            } else if (complaint.status === "In Progress") {
              statusClass = "status-in-progress";
            } else if (complaint.status === "Under Review") {
              statusClass = "status-under-review";
            }

            // Evidence thumbnails
            const evidenceHtml =
              complaint.media && complaint.media.length > 0
                ? `
                    <div class="evidence-section">
                        <div class="evidence-title">Evidence Photos</div>
                        <div class="evidence-grid">
                            ${complaint.media
                              .slice(0, 4)
                              .map(
                                (m) => `
                                <img src="${m.url}" class="evidence-thumbnail" onclick="event.stopPropagation(); viewMedia('${m.url}')">
                            `,
                              )
                              .join("")}
                            ${complaint.media.length > 4 ? `<span>+${complaint.media.length - 4} more</span>` : ""}
                        </div>
                    </div>
                `
                : "";

            // Completion photo
            const completionHtml = complaint.completionPhoto
              ? `
                    <div class="completion-section">
                        <div class="completion-badge">
                            <i class="fas fa-check-circle"></i> Work Completed Successfully!
                        </div>
                        <img src="${complaint.completionPhoto}" 
                             class="completion-photo" 
                             onclick="event.stopPropagation(); viewMedia('${complaint.completionPhoto}')"
                             title="Click to enlarge">
                        <p style="color: #718096; font-size: 13px; margin-top: 5px;">
                            <i class="fas fa-calendar"></i> Completed on ${new Date(complaint.resolvedAt || complaint.updatedAt).toLocaleDateString()}
                        </p>
                    </div>
                `
              : "";

            // Rating section
            const ratingHtml = complaint.feedback
              ? `
                    <div class="rating-section">
                        <div class="rating-stars">
                            ${"★".repeat(complaint.feedback.rating)}${"☆".repeat(5 - complaint.feedback.rating)}
                        </div>
                        ${complaint.feedback.comment ? `<div class="rating-comment">"${complaint.feedback.comment}"</div>` : ""}
                    </div>
                `
              : isCompleted
                ? `
                    <button class="rate-btn" onclick="event.stopPropagation(); openRatingModal('${complaint._id}', '${complaint.complaintId}')">
                        <i class="fas fa-star"></i> Rate This Resolution
                    </button>
                `
                : "";

            // Assigned info
            const assignedHtml =
              complaint.assignedTo && complaint.assignedTo.officer
                ? `
                    <div class="assigned-info">
                        <i class="fas fa-user-tie"></i> Assigned to: ${complaint.assignedTo.officer.name}
                        ${complaint.assignedTo.department ? `<br><i class="fas fa-building"></i> Department: ${complaint.assignedTo.department}` : ""}
                    </div>
                `
                : "";

            // Timeline preview
            const lastUpdate =
              complaint.timeline && complaint.timeline.length > 0
                ? complaint.timeline[complaint.timeline.length - 1]
                : null;

            return `
                    <div class="complaint-card ${isCompleted ? "completed" : ""} ${isEmergency ? "emergency" : ""} ${isInProgress ? "in-progress" : ""}" 
                         onclick="viewComplaintDetails('${complaint._id}')">
                        <div class="complaint-header">
                            <span class="complaint-id">${complaint.complaintId}</span>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        <h3 class="complaint-title">${complaint.title}</h3>
                        <p class="complaint-description">${complaint.description.substring(0, 150)}${complaint.description.length > 150 ? "..." : ""}</p>
                        <div class="complaint-meta">
                            <span><i class="fas fa-tag"></i> ${complaint.category}</span>
                            <span><i class="fas fa-calendar"></i> ${new Date(complaint.createdAt).toLocaleDateString()}</span>
                            <span><i class="fas fa-map-marker-alt"></i> ${complaint.location?.address?.split(",")[0] || "Location"}</span>
                        </div>
                        ${evidenceHtml}
                        ${completionHtml}
                        ${ratingHtml}
                        ${assignedHtml}
                        ${
                          lastUpdate
                            ? `
                            <div style="margin-top: 15px; font-size: 12px; color: #718096;">
                                <i class="fas fa-clock"></i> Last update: ${new Date(lastUpdate.updatedAt).toLocaleString()}
                            </div>
                        `
                            : ""
                        }
                    </div>
                `;
          })
          .join("");
      }

      // Setup pagination
      function setupPagination() {
        const pagination = document.getElementById("pagination");
        const totalPages = Math.ceil(filteredComplaints.length / itemsPerPage);

        if (totalPages <= 1) {
          pagination.innerHTML = "";
          return;
        }

        let paginationHtml = "";

        for (let i = 1; i <= totalPages; i++) {
          paginationHtml += `<button class="page-btn ${i === currentPage ? "active" : ""}" onclick="goToPage(${i})">${i}</button>`;
        }

        pagination.innerHTML = paginationHtml;
      }

      function goToPage(page) {
        currentPage = page;
        displayComplaints();
        setupPagination();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // View complaint details
      function viewComplaintDetails(complaintId) {
        const complaint = allComplaints.find((c) => c._id === complaintId);
        if (complaint && complaint.timeline) {
          let timelineText = `Timeline for ${complaint.complaintId}:\n\n`;
          complaint.timeline.forEach((t) => {
            timelineText += `${new Date(t.updatedAt).toLocaleString()}: ${t.status} - ${t.remark}\n`;
          });
          // Use a modal instead of alert
          showTimelineModal(complaint.complaintId, complaint.timeline);
        } else {
          showToast(`Viewing details for complaint: ${complaintId}`, "success");
        }
      }

      // Show timeline modal
      function showTimelineModal(complaintId, timeline) {
        const modal = document.createElement("div");
        modal.className = "rate-modal active";
        modal.innerHTML = `
                <div class="rate-modal-content" style="max-width: 500px;">
                    <h2 style="font-size: 24px; font-weight: 700; color: #2d3748; margin-bottom: 10px;">
                        <i class="fas fa-history" style="color: #667eea;"></i> Timeline - ${complaintId}
                    </h2>
                    <div style="max-height: 400px; overflow-y: auto; margin: 20px 0;">
                        ${timeline
                          .map(
                            (t) => `
                            <div style="padding: 10px; border-left: 3px solid #667eea; margin-bottom: 10px; background: #f7fafc;">
                                <div style="font-weight: 600; color: #2d3748;">${t.status}</div>
                                <div style="color: #718096; font-size: 13px;">${new Date(t.updatedAt).toLocaleString()}</div>
                                <div style="color: #4a5568; margin-top: 5px;">${t.remark}</div>
                            </div>
                        `,
                          )
                          .join("")}
                    </div>
                    <div class="modal-actions">
                        <button class="modal-btn cancel-btn" onclick="this.closest('.rate-modal').remove()">Close</button>
                    </div>
                </div>
            `;
        document.body.appendChild(modal);
      }

      // Rating Functions
      function openRatingModal(complaintId, complaintNumber) {
        selectedRatingComplaint = complaintId;
        document.getElementById("ratingComplaintInfo").innerHTML =
          `<strong>Complaint:</strong> ${complaintNumber}`;
        document.getElementById("rateModal").classList.add("active");

        // Setup star rating
        const stars = document.querySelectorAll(".star-rating i");
        stars.forEach((star) => {
          star.addEventListener("click", function () {
            const rating = parseInt(this.dataset.rating);
            selectedRating = rating;

            stars.forEach((s, index) => {
              if (index < rating) {
                s.classList.add("active");
              } else {
                s.classList.remove("active");
              }
            });

            document.getElementById("submitRatingBtn").disabled = false;
          });
        });
      }

      function closeRatingModal() {
        document.getElementById("rateModal").classList.remove("active");
        selectedRatingComplaint = null;
        selectedRating = 0;
        document.getElementById("ratingComment").value = "";
        document.getElementById("submitRatingBtn").disabled = true;

        // Reset stars
        document.querySelectorAll(".star-rating i").forEach((star) => {
          star.classList.remove("active");
        });
      }

      async function submitRating() {
        if (!selectedRatingComplaint || selectedRating === 0) return;

        const submitBtn = document.getElementById("submitRatingBtn");
        const originalText = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML =
          '<i class="fas fa-spinner fa-spin"></i> Submitting...';

        const comment = document.getElementById("ratingComment").value;

        try {
          const response = await fetch(
            `/api/complaints/${selectedRatingComplaint}/feedback`,
            {
              method: "POST",
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                rating: selectedRating,
                comment: comment,
              }),
            },
          );

          if (response.ok) {
            showToast(
              "Thank you for your feedback! You earned 2 points!",
              "success",
            );
            closeRatingModal();
            fetchComplaints(); // Refresh to show rating
          } else {
            const data = await response.json();
            showToast("Error: " + data.error, "error");
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
          }
        } catch (error) {
          console.error("Rating error:", error);
          showToast("Failed to submit rating", "error");
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        }
      }

      // Media viewing
      function viewMedia(url) {
        const modal = document.getElementById("mediaModal");
        const modalContent = document.getElementById("modalContent");

        if (url.match(/\.(mp4|webm|ogg)$/i)) {
          modalContent.innerHTML = `<video controls src="${url}"></video>`;
        } else {
          modalContent.innerHTML = `<img src="${url}" alt="Media">`;
        }

        modal.classList.add("active");
      }

      function closeMediaModal() {
        document.getElementById("mediaModal").classList.remove("active");
        document.getElementById("modalContent").innerHTML = "";
      }

      // Show loading state
      function showLoading() {
        document.getElementById("complaintsContainer").innerHTML = `
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading your complaints...</p>
                </div>
            `;
      }

      // Logout function
      function logout() {
        localStorage.removeItem("token");
        localStorage.removeItem("user");
        window.location.href = "/index.html";
      }

      // Filter event listeners
      document.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", function () {
          document
            .querySelectorAll(".filter-btn")
            .forEach((b) => b.classList.remove("active"));
          this.classList.add("active");
          currentFilter = this.dataset.filter;
          filterComplaints();
        });
      });

      // Search input
      document
        .getElementById("searchInput")
        .addEventListener("input", filterComplaints);

      // Initialize
      fetchComplaints();

      // Close modals when clicking outside
      window.onclick = function (event) {
        const rateModal = document.getElementById("rateModal");
        const mediaModal = document.getElementById("mediaModal");

        if (event.target === rateModal) {
          closeRatingModal();
        }
        if (event.target === mediaModal) {
          closeMediaModal();
        }
      };
    </script>
  </body>
</html>
